<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Nikate Nutrition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #16a34a;
  --primary-dark: #15803d;
  --danger: #ef4444;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
}
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 800;
  font-size: 1.3rem;
  margin-bottom: 32px;
  justify-content: center;
}
.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
}
h2 {
  font-size: 1.6rem;
  font-weight: 800;
  margin-bottom: 6px;
  text-align: center;
}
.subtitle {
  color: var(--muted);
  text-align: center;
  margin-bottom: 28px;
  font-size: 0.95rem;
}
.form-group {
  margin-bottom: 18px;
}
.form-label {
  display: block;
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 0.9rem;
}
.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  transition: all 0.2s;
}
.form-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
}
.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}
.btn-login:hover {
  background: var(--primary-dark);
}
.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.error-msg {
  background: #fee2e2;
  color: var(--danger);
  border-radius: 8px;
  padding: 12px;
  font-size: 0.9rem;
  font-weight: 500;
  margin-bottom: 16px;
  display: none;
  text-align: center;
}
.error-msg.show { display: block; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">💊</div>
    <span>Nikate Admin</span>
  </div>
  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to manage your store</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-input" id="email" type="email" placeholder="admin@example.com">
  </div>

  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" id="password" type="password" placeholder="••••••••">
  </div>

  <button class="btn-login" id="loginBtn" onclick="login()">Sign In</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDF6_9adRR6L_OFlqEVxXWhD1vzu5s-rdQ",
  authDomain: "nikte-nutritions.firebaseapp.com",
  databaseURL: "https://nikte-nutritions-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nikte-nutritions",
  storageBucket: "nikte-nutritions.firebasestorage.app",
  messagingSenderId: "529855257412",
  appId: "1:529855257412:web:0079f82673f2f956641511"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if(user) window.location.href = 'admin.html';
});

window.login = async function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  if(!email || !password) {
    errorMsg.textContent = 'Please enter email and password';
    errorMsg.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errorMsg.classList.remove('show');

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = 'admin.html';
  } catch(error) {
    let msg = 'Login failed. Try again.';
    if(error.code === 'auth/user-not-found') msg = 'No account found with this email.';
    if(error.code === 'auth/wrong-password') msg = 'Incorrect password.';
    if(error.code === 'auth/invalid-email') msg = 'Invalid email address.';
    if(error.code === 'auth/too-many-requests') msg = 'Too many attempts. Try later.';
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

document.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') login();
});
</script>
</body>
</html>
