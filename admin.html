<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nikate Admin Console</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
    }
  </style>
</head>
<body class="p-6">

  <div class="max-w-6xl mx-auto space-y-6">
    
    <!-- HEADER -->
    <header class="flex justify-between items-center bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
      <div>
        <h1 class="text-2xl font-extrabold tracking-tight">Console Dashboard</h1>
        <p class="text-xs text-gray-400 mt-1">Nikate Nutritions & Supplements Operations Hub</p>
      </div>
      <!-- Shop Open Toggle Status -->
      <div class="flex items-center gap-3">
        <span class="text-sm font-semibold">Store Status:</span>
        <button id="shop-toggle-btn" onclick="toggleStoreStatus()" class="px-4 py-2 bg-black text-white rounded-xl text-xs font-bold">Checking...</button>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- COLUMN 1: LIVE ORDERS PIPELINE -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
          <h2 class="text-lg font-extrabold tracking-tight mb-4 text-black"><i class="fa-solid fa-truck-ramp-box mr-2"></i>Incoming Orders</h2>
          <div id="admin-orders-list" class="space-y-4">
            <p class="text-xs text-gray-400">Loading order queue...</p>
          </div>
        </div>
        
        <!-- PRODUCT DIRECTORY EDITOR -->
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-6">
          <div class="flex justify-between items-center">
            <h2 class="text-lg font-extrabold tracking-tight text-black"><i class="fa-solid fa-boxes-stacked mr-2"></i>Product Catalog</h2>
            <button onclick="openProductModal()" class="px-3 py-1.5 bg-black text-white rounded-xl text-xs font-bold">Add Product</button>
          </div>
          <div id="admin-products-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Dynamically populated list -->
          </div>
        </div>
      </div>

      <!-- COLUMN 2: OPERATIONS & CHATS -->
      <div class="space-y-6">
        
        <!-- COUPON ENGINE PANEL -->
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-4">
          <h2 class="text-lg font-extrabold tracking-tight text-black"><i class="fa-solid fa-ticket-simple mr-2"></i>Coupon Generator</h2>
          <div class="space-y-3">
            <input type="text" id="new-coupon-code" placeholder="CODE (e.g. FIT30)" class="w-full px-3 py-2 bg-gray-50 border-none rounded-xl text-xs outline-none">
            <input type="number" id="new-coupon-val" placeholder="Discount Amount/Percentage" class="w-full px-3 py-2 bg-gray-50 border-none rounded-xl text-xs outline-none">
            <button onclick="createCouponCode()" class="w-full py-2.5 bg-black text-white rounded-xl text-xs font-bold">Activate Coupon</button>
          </div>
          <div id="coupons-list" class="border-t border-gray-100 pt-3 space-y-2">
            <!-- Active coupons shown here -->
          </div>
        </div>

        <!-- LIVE CHAT QUEUE TERMINAL -->
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-4">
          <h2 class="text-lg font-extrabold tracking-tight text-black"><i class="fa-solid fa-comments mr-2"></i>Live Inbox</h2>
          <div id="chats-queue" class="space-y-2">
            <!-- Inbox List -->
          </div>
          <!-- Admin Chat Frame -->
          <div id="admin-chat-box" class="hidden border border-gray-100 rounded-xl overflow-hidden flex flex-col h-64 bg-gray-50">
            <div class="bg-black text-white p-3 text-xs flex justify-between items-center">
              <span id="active-chat-title" class="font-bold">Chatting with...</span>
              <button onclick="closeAdminChat()" class="opacity-80"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="admin-messages-box" class="p-3 flex-1 overflow-y-auto space-y-2 text-[11px]"></div>
            <div class="p-2 bg-white flex gap-2">
              <input type="text" id="admin-chat-input" placeholder="Type reply..." class="flex-1 px-3 py-1.5 bg-gray-50 rounded-xl text-xs outline-none">
              <button onclick="sendAdminReply()" class="px-3 py-1 bg-black text-white rounded-xl text-xs"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- PRODUCT EDITING / ADD MODAL -->
  <div id="prod-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded-2xl shadow-2xl w-96 space-y-4">
      <div class="flex justify-between items-center">
        <h3 id="modal-title" class="font-extrabold text-base">New Product Asset</h3>
        <button onclick="closeProductModal()" class="text-gray-400 hover:text-black"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="space-y-3">
        <input type="text" id="prod-name" placeholder="Product Name" class="w-full px-3 py-2 bg-gray-50 border-none rounded-xl text-xs outline-none focus:ring-1 focus:ring-black">
        <input type="number" id="prod-price" placeholder="Pricing (INR)" class="w-full px-3 py-2 bg-gray-50 border-none rounded-xl text-xs outline-none focus:ring-1 focus:ring-black">
        <input type="text" id="prod-img" placeholder="Image URL (Unsplash or direct link)" class="w-full px-3 py-2 bg-gray-50 border-none rounded-xl text-xs outline-none focus:ring-1 focus:ring-black">
        <select id="prod-cat" class="w-full px-3 py-2 bg-gray-50 border-none rounded-xl text-xs outline-none focus:ring-1 focus:ring-black">
          <option value="cat_01">Whey Protein</option>
          <option value="cat_02">Creatine & Pre-Workout</option>
          <option value="cat_03">Vitamins & Essentials</option>
        </select>
      </div>
      <button onclick="saveProductItem()" class="w-full py-3 bg-black text-white rounded-xl text-xs font-bold">Save Assets</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, update, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDF6_9adRR6L_OFlqEVxXWhD1vzu5s-rdQ",
      authDomain: "nikte-nutritions.firebaseapp.com",
      databaseURL: "https://nikte-nutritions-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "nikte-nutritions",
      storageBucket: "nikte-nutritions.firebasestorage.app",
      messagingSenderId: "529855257412",
      appId: "1:529855257412:web:0079f82673f2f956641511"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let storeOpen = true;
    let selectedChatId = null;

    // Toggle Store Status Live State
    onValue(ref(db, 'shopStatus'), (snap) => {
      const data = snap.val();
      if(data) {
        storeOpen = data.isOpen;
        const btn = document.getElementById('shop-toggle-btn');
        btn.textContent = storeOpen ? 'ACTIVE - OPEN' : 'PAUSED - CLOSED';
        btn.className = storeOpen 
          ? "px-4 py-2 bg-green-500 text-white rounded-xl text-xs font-bold transition-all" 
          : "px-4 py-2 bg-red-500 text-white rounded-xl text-xs font-bold transition-all";
      }
    });

    window.toggleStoreStatus = () => {
      update(ref(db, 'shopStatus'), { isOpen: !storeOpen });
    };

    // Live Orders Queue Listener
    onValue(ref(db, 'orders'), (snap) => {
      const data = snap.val();
      const orderContainer = document.getElementById('admin-orders-list');
      orderContainer.innerHTML = '';
      if(!data) {
        orderContainer.innerHTML = `<p class="text-xs text-gray-400">All caught up! No pending orders.</p>`;
        return;
      }

      Object.entries(data).reverse().forEach(([id, order]) => {
        let itemsStr = order.items.map(i => `${i.name} (x${i.qty})`).join(', ');
        let statusBadgeColor = "bg-yellow-50 text-yellow-600";
        if(order.status === 'shipping' || order.status === 'preparing') statusBadgeColor = "bg-blue-50 text-blue-600";
        if(order.status === 'shipped') statusBadgeColor = "bg-green-50 text-green-600";
        if(order.status === 'declined') statusBadgeColor = "bg-red-50 text-red-600";

        orderContainer.innerHTML += `
          <div class="bg-gray-50 p-5 rounded-2xl space-y-3 relative">
            <div class="flex justify-between items-start">
              <div>
                <h4 class="font-extrabold text-sm text-black">${order.customerName} (${order.customerPhone})</h4>
                <p class="text-[10px] text-gray-400 mt-0.5">Order UID: #${id.slice(-6).toUpperCase()}</p>
              </div>
              <span class="text-[9px] font-bold px-2 py-1 rounded-lg ${statusBadgeColor}">${order.status.toUpperCase()}</span>
            </div>
            <p class="text-xs text-gray-600"><strong>Cart:</strong> ${itemsStr}</p>
            <p class="text-xs text-gray-600"><strong>Location:</strong> ${order.address}</p>
            <div class="flex justify-between items-center pt-2 border-t border-gray-100">
              <span class="text-xs font-extrabold text-black">Total: ₹${order.totalAmount}</span>
              <div class="flex gap-1.5">
                ${order.status === 'pending' ? `
                  <button onclick="modifyOrderStatus('${id}', 'preparing')" class="px-3 py-1.5 bg-black text-white text-[10px] font-bold rounded-lg">Accept</button>
                  <button onclick="modifyOrderStatus('${id}', 'declined')" class="px-3 py-1.5 bg-gray-200 text-black text-[10px] font-bold rounded-lg">Decline</button>
                ` : order.status === 'preparing' ? `
                  <button onclick="modifyOrderStatus('${id}', 'shipping')" class="px-3 py-1.5 bg-blue-600 text-white text-[10px] font-bold rounded-lg">Ship</button>
                ` : order.status === 'shipping' ? `
                  <button onclick="modifyOrderStatus('${id}', 'shipped')" class="px-3 py-1.5 bg-green-600 text-white text-[10px] font-bold rounded-lg">Complete Delivery</button>
                ` : `<span class="text-[10px] text-gray-400 font-semibold"><i class="fa-solid fa-circle-check mr-1 text-green-500"></i>Handled</span>`}
              </div>
            </div>
          </div>
        `;
      });
    });

    window.modifyOrderStatus = (id, newStatus) => {
      update(ref(db, `orders/${id}`), { status: newStatus });
    };

    // Load Live Catalog Products
    onValue(ref(db, 'products'), (snap) => {
      const data = snap.val();
      const container = document.getElementById('admin-products-grid');
      container.innerHTML = '';
      if(!data) return;

      Object.entries(data).forEach(([id, prod]) => {
        container.innerHTML += `
          <div class="p-4 bg-gray-50 rounded-2xl flex justify-between items-center">
            <div class="flex items-center gap-3">
              <img src="${prod.image}" class="w-12 h-12 object-cover rounded-xl bg-white p-0.5">
              <div>
                <h4 class="font-extrabold text-xs text-black leading-tight">${prod.name}</h4>
                <p class="text-[10px] text-gray-400 mt-1">₹${prod.price}</p>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <button onclick="toggleStockStatus('${id}', ${!prod.inStock})" class="px-2.5 py-1 text-[9px] font-bold rounded-lg ${prod.inStock ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                ${prod.inStock ? 'In Stock' : 'Out of Stock'}
              </button>
              <button onclick="removeProduct('${id}')" class="w-7 h-7 bg-white border border-gray-100 rounded-lg flex items-center justify-center text-red-500 text-xs"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
        `;
      });
    });

    window.toggleStockStatus = (id, status) => {
      update(ref(db, `products/${id}`), { inStock: status });
    };

    window.removeProduct = (id) => {
      if(confirm("Confirm item deletion?")) {
        remove(ref(db, `products/${id}`));
      }
    };

    // Product Modals
    window.openProductModal = () => document.getElementById('prod-modal').classList.remove('hidden');
    window.closeProductModal = () => document.getElementById('prod-modal').classList.add('hidden');

    window.saveProductItem = () => {
      const name = document.getElementById('prod-name').value.trim();
      const price = parseFloat(document.getElementById('prod-price').value);
      const image = document.getElementById('prod-img').value.trim() || 'https://images.unsplash.com/photo-1579758629938-03607ccdbaba?w=120';
      const categoryId = document.getElementById('prod-cat').value;

      if(!name || isNaN(price)) return;
      const pushKey = push(ref(db, 'products')).key;
      set(ref(db, `products/${pushKey}`), { name, price, image, categoryId, inStock: true })
        .then(() => {
          closeProductModal();
          document.getElementById('prod-name').value = '';
          document.getElementById('prod-price').value = '';
          document.getElementById('prod-img').value = '';
        });
    };

    // Live Chat Operations Box
    onValue(ref(db, 'chats'), (snap) => {
      const data = snap.val();
      const list = document.getElementById('chats-queue');
      list.innerHTML = '';
      if(!data) {
        list.innerHTML = `<p class="text-xs text-gray-400">Inbox empty.</p>`;
        return;
      }
      Object.entries(data).forEach(([key, val]) => {
        const info = val.customerInfo;
        if(!info) return;
        list.innerHTML += `
          <button onclick="openChatSession('${key}', '${info.name}')" class="w-full text-left p-3 bg-gray-50 hover:bg-gray-100 rounded-xl flex items-center justify-between transition-colors">
            <div>
              <p class="font-extrabold text-xs text-black">${info.name}</p>
              <p class="text-[9px] text-gray-400 mt-0.5">${info.phone}</p>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-400 text-xs"></i>
          </button>
        `;
      });
    });

    window.openChatSession = (chatId, custName) => {
      selectedChatId = chatId;
      document.getElementById('active-chat-title').textContent = `Chatting with ${custName}`;
      document.getElementById('admin-chat-box').classList.remove('hidden');
      
      onValue(ref(db, `chats/${chatId}/messages`), (snap) => {
        const data = snap.val();
        const box = document.getElementById('admin-messages-box');
        box.innerHTML = '';
        if(!data) return;
        Object.values(data).forEach(msg => {
          const isCustomer = msg.sender === 'customer';
          box.innerHTML += `
            <div class="flex ${isCustomer ? 'justify-start' : 'justify-end'}">
              <div class="max-w-[75%] p-2 rounded-xl ${isCustomer ? 'bg-white text-black border border-gray-200' : 'bg-black text-white'}">
                <p class="leading-relaxed">${msg.text}</p>
              </div>
            </div>
          `;
        });
        box.scrollTop = box.scrollHeight;
      });
    };

    window.closeAdminChat = () => {
      document.getElementById('admin-chat-box').classList.add('hidden');
      selectedChatId = null;
    };

    window.sendAdminReply = () => {
      const inp = document.getElementById('admin-chat-input');
      const text = inp.value.trim();
      if(!text || !selectedChatId) return;
      const refMsg = push(ref(db, `chats/${selectedChatId}/messages`));
      set(refMsg, { sender: 'admin', text: text, timestamp: Date.now() });
      inp.value = '';
    };

    // Coupons Engine Control Operations
    window.createCouponCode = () => {
      const code = document.getElementById('new-coupon-code').value.toUpperCase().trim();
      const val = parseFloat(document.getElementById('new-coupon-val').value);
      if(!code || isNaN(val)) return;

      set(ref(db, `coupons/${code}`), {
        discountType: "percentage",
        value: val,
        isActive: true
      }).then(() => {
        document.getElementById('new-coupon-code').value = '';
        document.getElementById('new-coupon-val').value = '';
      });
    };

    onValue(ref(db, 'coupons'), (snap) => {
      const data = snap.val();
      const box = document.getElementById('coupons-list');
      box.innerHTML = '';
      if(!data) return;
      Object.entries(data).forEach(([code, c]) => {
        box.innerHTML += `
          <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl text-xs">
            <span class="font-extrabold text-black">${code} (${c.value}%)</span>
            <button onclick="deleteCoupon('${code}')" class="text-red-500"><i class="fa-solid fa-circle-minus"></i></button>
          </div>
        `;
      });
    });

    window.deleteCoupon = (code) => {
      remove(ref(db, `coupons/${code}`));
    };
  </script>
</body>
</html>
